function b64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0));}
async function decrypt(pw){
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey("raw", enc.encode(pw), {name:"PBKDF2"}, false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:b64(DATA.salt), iterations:DATA.iter, hash:"SHA-256"},
    km, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:b64(DATA.iv)}, key, b64(DATA.ct));
  return new TextDecoder().decode(pt);
}
const f=document.getElementById("f"), err=document.getElementById("err");
f.addEventListener("submit", async (e)=>{
  e.preventDefault();
  err.textContent="";
  const btn=f.querySelector("button"); btn.textContent="Dešifruji…"; btn.disabled=true;
  try{
    const html = await decrypt(document.getElementById("pw").value);
    document.open(); document.write(html); document.close();
  }catch(_){
    err.textContent="Nesprávné heslo, zkuste to znovu.";
    btn.textContent="Zobrazit"; btn.disabled=false;
  }
});
